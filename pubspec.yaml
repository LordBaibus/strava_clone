name: strava_clone
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1


environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  http: ^1.6.0
  geolocator: ^14.0.2
  geocoding: ^2.1.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  video_player: ^2.11.0
  photo_manager: ^3.8.2
  ffmpeg_kit_min_gpl: ^6.0.3+2-LTS
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  ios: true
  android: true
  image_path: assets/strava.png
  windows:
    generate: true
    size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/record.png
    - assets/layers.png
    - assets/profile1.jpg
    - assets/profile2.jpg
    - assets/profile3.jpg
    - assets/profile4.jpg
    - assets/angelenos_runners.jpg
    - assets/clark_runners.jpg
    - assets/clark_running_club.jpg
    - assets/pampanga_cycling.jpg